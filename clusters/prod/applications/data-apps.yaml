apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-apps-prod
  namespace: argocd
spec:
  project: apps-prod
  source:
    repoURL: https://git.example.com/your-org/data-apps-gitops.git
    targetRevision: main
    path: bootstrap/prod
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
