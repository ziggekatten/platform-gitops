apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-test
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - component: namespaces
          - component: gatekeeper
          - component: gateway
          - component: network-policies
          - component: policies
  template:
    metadata:
      name: platform-{{.component}}-test
      labels:
        env: test
        app.kubernetes.io/part-of: platform
    spec:
      project: platform
      source:
        repoURL: https://github.com/ziggekatten/platform-gitops
        targetRevision: main
        path: platform/{{.component}}/base
      destination:
        name: in-cluster
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
