apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
data:
  policy.default: role:readonly
  policy.csv: |
    p, role:readonly, applications, get, */*, allow
    p, role:readonly, projects, get, *, allow
    p, role:platform-admin, *, *, *, allow
    g, your-org:platform-admins, role:platform-admin
  scopes: '[groups]'
