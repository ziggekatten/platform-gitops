apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-test
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/ziggekatten/platform-gitops
    targetRevision: main
    path: bootstrap/argocd/install/overlays/test
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
