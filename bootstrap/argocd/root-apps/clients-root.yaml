apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clients-root
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/ziggekatten/platform-gitops
    targetRevision: main
    path: clusters/clients
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
