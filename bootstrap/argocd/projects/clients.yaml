apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: clients
  namespace: argocd
spec:
  description: Client-specific workloads
  sourceRepos:
    - https://github.com/ziggekatten/data-apps-gitops
  destinations:
    - name: in-cluster
      namespace: argocd
    - name: in-cluster
      namespace: client-*
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
